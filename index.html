<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asia Zwierzchowska</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.gstatic.com/s/figtree/v9/_Xms-HUzqDCFdgfMq4a3CoZt.woff2" as="font" type="font/woff2" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&display=block" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Figtree', sans-serif;
      background: #ffffff;
      color: #000831;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: #000831;
      color: #ffffff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
      transition: filter 0.3s ease;
    }

    h1:hover {
      filter: blur(4px);
    }

    .phonetic {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #000831;
      font-weight: 400;
      margin-bottom: 1.25rem;
    }

    .tagline {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .cta {
      font-size: 0.85rem;
      color: #000831;
    }

    .cta a {
      color: #000831;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: border-color 0.2s;
    }

    .cta a:hover {
      border-bottom-color: #000831;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Asia Zwierzchowska</h1>
    <p class="phonetic">/ˈaʑa zvʲɛʐxɔˈvska/</p>
    <p class="tagline">architect, educator & project manager</p>
    <p class="cta">CV & portfolio available <a href="mailto:a.zwska@gmail.com">on request</a></p>
  </div>
</body>
</html>
